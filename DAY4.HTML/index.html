<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XYZ Form</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .main {
        width: 100%;
        height: 100vh;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url("./img/RCB.png");
      }
      .reg {
        height: auto;
        width: 350px;
        background-size: 100% 100%;
        background-color: rgb(141, 141, 141, 0.5);

        color: white;
        display: flex;
        justify-content: center;
        align-items: start;
        /* flex-direction: column; */
        flex-flow: column;
        padding: 50px 70px;
        gap: 5px;
      }
      .reg > input {
        width: 100%;
        padding: 5px;
        outline: none;
        border: none;
        background: none;
        color: white;
        border-bottom: 1px solid white;
      }
      .reg > button {
        width: 100%;
        padding: 5px;
        border: none;
        background-color: #000;
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <form action="" class="reg">
        <label for="">Full Name</label>
        <input type="text" placeholder="  Enter your full name" />

        <label for="">Email Address</label>
        <input type="email" placeholder="Enter your email" />
        <label for="">Password</label>
        <input type="password" />
        <label for="">Confirm Passwor</label>
        <input type="password" />

        <div>
          <label for="">Gender </label>
          <label for="">Male</label>
          <input type="radio" name="Gender" />

          <label for="">Female</label>
          <input type="radio" name="Gender" />

          <label for="">others</label>
          <input type="radio" name="Gender" />
          <!-- Gender -->
        </div>

        <label for="">Date of Birth</label>
        <input type="date" />

        <label for="">country </label>
        <select name="" id="">
          <option value="">INDIA</option>
          <option value="">PAK</option>
          <option value="">USK</option>
          <option value="">UK</option>
          <option value="">UKE</option>
        </select>

        <p><input type="checkbox" /> I agree to the Terms of Service and Privacy Policy</p>


         <!-- <textarea name="" id=""></textarea> -->

        <button type="submit">REG</button>
        <button type="reset">reset</button>
      </form>
    </div>
  </body>
</html>
